base_config: /home/projects/zeevid/ofirlev/llm/configs/training_config.yaml
sweep_name: mlp_baseline_sweep

paths:
  output_root: /home/projects/zeevid/ofirlev/llm/training/sweeps
  python_bin: /home/projects/zeevid/ofirlev/.conda/envs/training/bin/python
  train_script: /home/projects/zeevid/ofirlev/llm/training/train.py

cluster:
  queue: long-gpu
  gpu_mem_gb: 128
  host_mem_gb: 64
  cpu_threads: 20

wandb:
  group: mlp_baseline_sweep
  job_type: sweep
  tags:
    - sweep
    - baseline
    - mlp

fixed_overrides:
  training:
    max_epochs: 20

grid:
  learning_rate:
    - 0.001
    - 0.0003
  dropout:
    - 0.1
    - 0.2
  weight_decay:
    - 0.0001
    - 0.00001

constraints:
  include:
    - learning_rate: 0.001
      dropout: 0.1
      weight_decay: 0.0001
    - learning_rate: 0.0003
      dropout: 0.1
      weight_decay: 0.0001
    - learning_rate: 0.001
      dropout: 0.2
      weight_decay: 0.0001
    - learning_rate: 0.0003
      dropout: 0.2
      weight_decay: 0.0001
    - learning_rate: 0.001
      dropout: 0.1
      weight_decay: 0.00001
    - learning_rate: 0.0003
      dropout: 0.1
      weight_decay: 0.00001
